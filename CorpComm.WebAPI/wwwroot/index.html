<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CorpComm - Тест Відеозустрічі</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .video-container { display: flex; gap: 15px; margin-top: 20px; }
        video { width: 320px; height: 240px; background-color: #222; border-radius: 8px; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>Кімната переговорів</h2>
    
    <div class="controls">
        <input type="text" id="userName" placeholder="Твоє ім'я" />
        <button id="joinBtn">Приєднатися до кімнати</button>
        <button id="disconnectBtn">Від'єднатися</button>
        <button id="startVideoBtn">Увімкнути камеру</button>
        <button id="stopVideoBtn">Вимкнути камеру</button>
    </div>

    <ul id="messagesList"></ul>

    <div class="video-container">
        <!-- Твоє відео (muted обов'язково, щоб не було відлуння від самого себе) -->
        <video id="localVideo" autoplay muted playsinline></video>
        <!-- Відео співрозмовника (поки порожнє) -->
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        const connection = new signalR.HubConnectionBuilder()
    .withUrl("/hubs/meeting") 
    .configureLogging(signalR.LogLevel.Warning)
    .build();

let localStream;
let peerConnection;
let remoteUserConnectionId;
let pendingCandidates = []; 
const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

// 1. Увімкнення камери
document.getElementById("startVideoBtn").addEventListener("click", async () => {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        console.log("Камеру підключено.");
    } catch (err) {
        console.error("Помилка камери:", err);
        alert("Не вдалося отримати доступ до камери. Можливо, вона зайнята іншою вкладкою.");
    }
});

// 2. Вимкнення камери
document.getElementById("stopVideoBtn").addEventListener("click", () => {
    if (localStream) {
        // Повідомляємо іншого користувача, що ми відключаємось
        if (remoteUserConnectionId && connection.state === signalR.HubConnectionState.Connected) {
            connection.invoke("SendSignal", JSON.stringify({ type: "close" }), remoteUserConnectionId);
        }

        // Зупиняємо камеру у себе
        localStream.getTracks().forEach(track => track.stop());
        document.getElementById("localVideo").srcObject = null;
        localStream = null;

        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        console.log("Камеру вимкнено, сигнал про закриття відправлено.");
    }
});

// 3. Підключення до SignalR
document.getElementById("joinBtn").addEventListener("click", async () => {
    const user = document.getElementById("userName").value || "Гість";
    const meetingId = "test-meeting-123";
    
    try {
        if (connection.state === signalR.HubConnectionState.Disconnected) {
            await connection.start();
        }
        await connection.invoke("JoinMeeting", meetingId, user);
        console.log("Приєднано до кімнати.");
    } catch (err) {
        console.error("Помилка SignalR:", err);
    }
});

// 4. Від'єднання
document.getElementById("disconnectBtn").addEventListener("click", async () => {
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    if (connection.state !== signalR.HubConnectionState.Disconnected) {
        await connection.stop();
    }
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("messagesList").innerHTML = "";
    pendingCandidates = [];
    console.log("Зв'язок розірвано.");
});

// 5. Ініціалізація P2P
function initPeerConnection(targetConnectionId) {
    if (peerConnection) return; 

    peerConnection = new RTCPeerConnection(rtcConfig);

    // Додаємо потік, тільки якщо він існує
    if (localStream) {
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
    }

    peerConnection.ontrack = event => {
        console.log("Отримано віддалений потік");
        document.getElementById("remoteVideo").srcObject = event.streams[0];
    };

    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            connection.invoke("SendSignal", JSON.stringify({ type: "candidate", data: event.candidate }), targetConnectionId);
        }
    };
}

// 6. Логіка Signaling
connection.on("UserJoined", async (user, newConnectionId) => {
    if (newConnectionId === connection.connectionId) {
        console.log("Ви приєдналися до кімнати. Чекаємо на інших учасників...");
        return;
    }
    remoteUserConnectionId = newConnectionId;

    console.log(`${user} приєднався. Ініціюємо з'єднання (створюємо Offer)...`);
    initPeerConnection(newConnectionId);
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    connection.invoke("SendSignal", JSON.stringify({ type: "offer", data: offer }), newConnectionId);
});

connection.on("ReceiveSignal", async (signalString, senderId) => {
    const signal = JSON.parse(signalString);

    if (signal.type === "offer") {
        remoteUserConnectionId = senderId;
        initPeerConnection(senderId);
        await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.data));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        connection.invoke("SendSignal", JSON.stringify({ type: "answer", data: answer }), senderId);
        processPendingCandidates();
    } 
    else if (signal.type === "answer") {
        if (peerConnection && peerConnection.signalingState !== "stable") {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.data));
            processPendingCandidates();
        }
    } 
    else if (signal.type === "candidate") {
        const candidate = new RTCIceCandidate(signal.data);
        if (peerConnection && peerConnection.remoteDescription) {
            await peerConnection.addIceCandidate(candidate).catch(e => console.error(e));
        } else {
            pendingCandidates.push(candidate);
        }
    }
    else if (signal.type === "close") {
        console.log("Співрозмовник вимкнув відео.");
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        document.getElementById("remoteVideo").srcObject = null; // Очищаємо картинку
    }
});

function processPendingCandidates() {
    pendingCandidates.forEach(async (can) => {
        await peerConnection.addIceCandidate(can).catch(e => console.error(e));
    });
    pendingCandidates = [];
}
    </script>
</body>
</html>

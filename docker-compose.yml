version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: corpcomm_postgres
    environment:
      POSTGRES_USER: corpcomm_user
      POSTGRES_PASSWORD: corpcomm_password
      POSTGRES_DB: corpcomm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: corpcomm_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: